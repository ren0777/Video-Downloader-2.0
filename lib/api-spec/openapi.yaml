openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Multi-platform HD Video Downloader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: video
    description: Video download operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /video/download:
    post:
      operationId: downloadVideo
      tags: [video]
      summary: Download video
      description: Fetches video info and watermark-free HD download URL from a supported platform link (TikTok, YouTube, Instagram, Facebook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "200":
          description: Video info and download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResult"
        "400":
          description: Invalid URL or unsupported platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    VideoInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Video URL (TikTok, YouTube, Instagram, or Facebook)

    VideoResult:
      type: object
      required:
        - id
        - title
        - author
        - cover
        - downloadUrl
        - duration
        - platform
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        authorAvatar:
          type: string
          nullable: true
        cover:
          type: string
          nullable: true
        downloadUrl:
          type: string
          description: Watermark-free HD download URL
        duration:
          type: integer
          description: Duration in seconds
        platform:
          type: string
          enum: [tiktok, youtube, instagram, facebook]
        likes:
          type: integer
          nullable: true
        comments:
          type: integer
          nullable: true
        shares:
          type: integer
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
